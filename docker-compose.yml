services:
  calliope:
    container_name: calliope_core
    image: calliope:dev
    restart: "unless-stopped"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MONGO_URI=mongodb://mongodb:27017
      - LOG_LEVEL=DEBUG
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mongodb
    # Il comando di avvio è il CMD del Dockerfile (python -m calliope nella venv uv).

  mongodb:
    image: mongo:8.0.0-rc6
    container_name: "mongodb_calliope"
    restart: "unless-stopped"
    ports:
      - "27018:27017"
    volumes:
      - mongodb_calliope:/data/db

volumes:
  mongodb_calliope:
