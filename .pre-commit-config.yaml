repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        # ignore_missing_imports=true in pyproject: mypy gira senza le dipendenze
        # runtime del progetto.
        pass_filenames: false
        args: [calliope]
